<!DOCTYPE html>
<html>
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>CineArena.Fun</title> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style> 
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; object-fit: contain; }
        .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg { display: none !important; visibility: hidden !important; opacity: 0 !important; }
        .shaka-controls-button, .shaka-overflow-button-label, .shaka-current-time, .shaka-time-container { color: dark-blue !important; }
        .shaka-controls-button svg path { fill: #1e90ff !important; }
    </style>
</head>
<body> 
    <div class="shaka-video-container" data-shaka-player> 
        <video autoplay muted playsinline preload="metadata" poster="https://i.postimg.cc/mD1VCt2C/RS-Live.png"></video>
    </div>

    <script> 
        document.addEventListener('DOMContentLoaded', async () => { 
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) { console.error('Browser not supported'); return; }
            const video = document.querySelector('video'); 
            const player = new shaka.Player(); 
            await player.attach(video);
            const container = document.querySelector('.shaka-video-container'); 
            const ui = new shaka.ui.Overlay(player, container, video);
            
            ui.configure({ 
                controlPanelElements: [ 'play_pause', 'mute', 'volume', 'time_and_duration', 'spacer', 'language', 'captions', 'picture_in_picture', 'quality', 'fullscreen' ], 
                volumeBarColors: { base: 'rgba(135, 206, 235, 0.35)', level: 'rgb(255,255,255)' }, 
                seekBarColors: { base: 'rgba(50, 55, 61)', buffered: 'rgba(135, 206, 235, 0.6)', played: 'rgb(255, 255, 255)' } 
            });

            const drmConfig = {
                clearKeys: { "513d389521a73afdd3cf0a74e53f3b2f":"392f7f7d2e451631e1075b20ce61f901" } 
            }; 
            
            let streamUrl = "https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/dash/enc/wvhgrxe0zw/out/v1/d336867052f04861bc67d2c567f31596/cenc.mpd"; 
            
            player.configure({ 
                drm: drmConfig, 
                streaming: { lowLatencyMode: true, bufferingGoal: 15, rebufferingGoal: 2, bufferBehind: 15, retryParameters: { timeout: 10000, maxAttempts: 5, baseDelay: 300, backoffFactor: 1.2 }, segmentRequestTimeout: 8000, segmentPrefetchLimit: 2, useNativeHlsOnSafari: true }, 
                manifest: { retryParameters: { timeout: 8000, maxAttempts: 3 } } 
            });

            player.addEventListener('error', (event) => { console.error('Shaka Player Error:', event.detail); });
            
            try { 
                await player.load(streamUrl); 
                console.log("Stream loaded successfully");
                video.muted = true; 
                const playPromise = video.play(); 
                if (playPromise !== undefined) { playPromise.catch(err => console.log("Autoplay blocked:", err)); }
            } catch (error) { console.error('Load error:', error); }
            
            document.addEventListener('click', () => { 
                if (video.muted) { video.muted = false; video.volume = 1; } 
            }, { once: true }); 
        }); 
    </script>
    <script src="https://pl26377172.effectivecpmnetwork.com/d7/8b/93/d78b9343b29d8ff89244b094b359e591.js"></script>
</body>
</html>
