<!DOCTYPE html>
<html>
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>https://rslivetv.vercel.app</title> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style> 
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; object-fit: contain; }
        
        /* লোডিং এনিমেশন স্টাইল */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #1e90ff; border-radius: 50%;
            animation: spin 1s linear infinite; z-index: 10;
        }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body> 
    <div class="shaka-video-container" data-shaka-player> 
        <div id="loader"></div> <video autoplay muted playsinline preload="metadata" poster="https://d34080pnh6e62j.cloudfront.net/images/channels/mobile_large/17816859931020x576.jpg"></video>
    </div>

    <script> 
        document.addEventListener('DOMContentLoaded', async () => { 
            const video = document.querySelector('video'); 
            const loader = document.getElementById('loader');

            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) { console.error('Browser not supported'); return; }
            
            const player = new shaka.Player(); 
            await player.attach(video);
            const container = document.querySelector('.shaka-video-container'); 
            const ui = new shaka.ui.Overlay(player, container, video);
            
            // ভিডিও লোড হলে লোডার সরিয়ে নেওয়া
            video.addEventListener('loadeddata', () => { loader.style.display = 'none'; });

            ui.configure({ 
                controlPanelElements: [ 'play_pause', 'mute', 'volume', 'time_and_duration', 'spacer', 'language', 'captions', 'picture_in_picture', 'quality', 'fullscreen' ], 
                volumeBarColors: { base: 'rgba(135, 206, 235, 0.35)', level: 'rgb(255,255,255)' }, 
                seekBarColors: { base: 'rgba(50, 55, 61)', buffered: 'rgba(135, 206, 235, 0.6)', played: 'rgb(255, 255, 255)' } 
            });

            const drmConfig = { clearKeys: { "1544c349ebb47984ba648348b5eb4664":"b5aa349bbd609812fe85c2cc4b732d27" } }; 
            let streamUrl = "https://a96aivottlinear-a.akamaihd.net/OTTB/iad-nitro/enc/y4zizfzlo7/out/v1/cf00c1bacc0c4c8ba9da5218b8a6fe37/cenc.mpd"; 
            
            player.configure({ 
                drm: drmConfig, 
                streaming: { lowLatencyMode: true, bufferingGoal: 15, rebufferingGoal: 2, bufferBehind: 15 } 
            });

            try { 
                await player.load(streamUrl); 
            } catch (error) { 
                console.error('Load error:', error); 
                loader.style.display = 'none'; // এরর আসলেও লোডার বন্ধ হবে
            }
            
            document.addEventListener('click', () => { 
                if (video.muted) { video.muted = false; video.volume = 1; } 
            }, { once: true }); 
        }); 
    </script>
</body>
</html>
